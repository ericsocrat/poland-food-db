<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="TryVit icon mark">
  <title>TryVit</title>
  <desc>TryVit V-leaf shield mark. Shield-leaf silhouette in vitGreen #1DB954 on transparent. Source of truth for all PNG icon exports. Remains legible at 16x16.</desc>
  <!-- Shield-leaf silhouette — path scaled from 512×512 master (logomark.svg) ÷ 8 -->
  <path
    d="M 32 3.5
       C 45.5 8,   55.5 21, 55.5 34
       C 55.5 47,  42   57, 32   61
       C 22   57,  8.5  47, 8.5  34
       C 8.5  21,  18.5 8,  32   3.5
       Z"
    fill="#1DB954"
  />
  <!-- Accent dot — data score marker at leaf tip -->
  <circle cx="32" cy="9" r="2.5" fill="#00E676" opacity="0.90"/>
</svg>
