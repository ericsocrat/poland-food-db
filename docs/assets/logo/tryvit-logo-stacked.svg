<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 80" role="img" aria-label="TryVit — stacked lockup">
  <title>TryVit — Stacked Lockup</title>
  <desc>Vertical brand lockup: icon centered above wordmark. Use in square or app-store badge contexts where the horizontal lockup is too wide.</desc>
  <!-- Icon centered at top (48×48) -->
  <g transform="translate(24,0) scale(0.75)">
    <path
      d="M 32 3.5
         C 45.5 8,   55.5 21, 55.5 34
         C 55.5 47,  42   57, 32   61
         C 22   57,  8.5  47, 8.5  34
         C 8.5  21,  18.5 8,  32   3.5
         Z"
      fill="#1DB954"
    />
    <circle cx="32" cy="9" r="2.5" fill="#00E676" opacity="0.90"/>
  </g>
  <!-- Wordmark centered below icon -->
  <text
    x="48" y="72"
    font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="22"
    font-weight="800"
    letter-spacing="-0.03em"
    text-anchor="middle"
    dominant-baseline="auto"
  >
    <tspan fill="#0A2E1A">Try</tspan><tspan fill="#1DB954">Vit</tspan>
  </text>
</svg>
